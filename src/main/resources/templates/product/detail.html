<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
</head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h2 th:text="${product.name}" class="mb-4">Nama Produk</h2>

                <div class="card">
                    <div class="card-body">
                        <table class="table table-borderless mb-0">
                            <tr>
                                <th class="text-muted" style="width: 200px;">Nama</th>
                                <td th:text="${product.name}">-</td>
                            </tr>
                            <tr>
                                <th class="text-muted">Kategori</th>
                                <td th:text="${product.category?.displayName}">-</td>
                            </tr>
                            <tr>
                                <th class="text-muted">Harga</th>
                                <td th:text="${'Rp ' + #numbers.formatDecimal(product.price, 0, 'POINT', 0, 'COMMA')}">Rp 0</td>
                            </tr>
                            <tr>
                                <th class="text-muted">Stok</th>
                                <td th:text="${product.stock}">0</td>
                            </tr>
                            <tr>
                                <th class="text-muted">Deskripsi</th>
                                <td th:text="${product.description}">-</td>
                            </tr>
                            <tr>
                                <th class="text-muted">Status</th>
                                <td>
                                    <span th:if="${product.active}" class="badge bg-success">Aktif</span>
                                    <span th:unless="${product.active}" class="badge bg-danger">Tidak Aktif</span>
                                </td>
                            </tr>
                            <tr>
                                <th class="text-muted">Tanggal Dibuat</th>
                                <td th:text="${product.createdAt}">-</td>
                            </tr>
                        </table>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <a th:href="@{/products/{id}/edit(id=${product.id})}" class="btn btn-warning">Edit</a>
                    <a th:href="@{/products}" class="btn btn-secondary">Kembali ke Daftar</a>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
